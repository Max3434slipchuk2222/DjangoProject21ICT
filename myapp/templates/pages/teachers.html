{% extends 'pages/base.html' %}
{% load static %}

{% block title %}Вчителі — Maryco Club{% endblock %}

{% block content %}
<section class="max-w-6xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black text-center text-gray-900 mb-16">Наші викладачі</h1>

    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">
        {% for teacher in teachers %}
        <div class="bg-white rounded-2xl p-6 text-center shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all">

            <h3 class="font-black text-gray-900 mb-2">{{ teacher.full_name }}</h3>
            <span class="inline-block bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full">
                {{ teacher.subject }}
            </span>
        </div>
        {% empty %}
        <p class="text-center text-gray-400 col-span-4 py-12">Викладачі незабаром з'являться</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
